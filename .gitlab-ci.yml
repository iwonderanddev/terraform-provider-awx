variables:
  GIT_DEPTH: "0"

mirror_to_github:
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache bash curl git jq openssl
  script:
    # Quoted so YAML does not interpret `- :` as a mapping.
    - ': "${GITHUB_MIRROR_REPOSITORY:?GITHUB_MIRROR_REPOSITORY must be set (owner/repo)}"'
    - ': "${CI_REPOSITORY_URL:?CI_REPOSITORY_URL must be set}"'
    - chmod +x scripts/ci/github-installation-token.sh
    - set +x
    - TOKEN="$(scripts/ci/github-installation-token.sh)"
    - MIRROR_DIR="$(mktemp -d)"
    - trap 'rm -rf "$MIRROR_DIR"' EXIT
    - git clone --mirror "$CI_REPOSITORY_URL" "$MIRROR_DIR/repo.git"
    - GIT_TERMINAL_PROMPT=0 git -C "$MIRROR_DIR/repo.git" push --mirror "https://x-access-token:${TOKEN}@github.com/${GITHUB_MIRROR_REPOSITORY}.git"
