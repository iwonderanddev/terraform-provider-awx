variables:
  GIT_DEPTH: "0"

mirror_to_github:
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache bash curl git jq openssl
  script:
    # Quoted so YAML does not interpret `- :` as a mapping.
    - ': "${GITHUB_MIRROR_REPOSITORY:?GITHUB_MIRROR_REPOSITORY must be set (owner/repo)}"'
    - ': "${CI_DEFAULT_BRANCH:?CI_DEFAULT_BRANCH must be set}"'
    - chmod +x scripts/ci/github-installation-token.sh
    - set +x
    - TOKEN="$(scripts/ci/github-installation-token.sh)"
    - GITHUB_REMOTE="https://x-access-token:${TOKEN}@github.com/${GITHUB_MIRROR_REPOSITORY}.git"
    - GIT_TERMINAL_PROMPT=0 git push --force "$GITHUB_REMOTE" "HEAD:refs/heads/${CI_DEFAULT_BRANCH}"
    - STALE_REFS="$(git ls-remote --refs "$GITHUB_REMOTE" 'refs/merge-requests/*' 'refs/pipelines/*' | awk '{print $2}')"
    - if [ -n "$STALE_REFS" ]; then GIT_TERMINAL_PROMPT=0 git push "$GITHUB_REMOTE" --delete $STALE_REFS; fi
